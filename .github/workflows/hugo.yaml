# Hugo 构建 + 部署到 GitHub Pages（官方 deploy-pages artifact 方案）
# 仓库：drink-less-milktea.github.io（用户主页仓库，根路径部署，无需 base）
# 参考：https://gohugo.io/hosting-and-deployment/hosting-on-github/
#
# 首次使用前需在仓库 Settings → Pages → Source 选择 "GitHub Actions"

name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许在 Actions 页面手动触发

# 部署到 GitHub Pages 所需的 token 权限
permissions:
  contents: read
  pages: write
  id-token: write # 部署 Pages 必需

# 同一时间只跑一个部署，不取消进行中的部署
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Hugo 版本：与本机开发环境对齐（0.164.0 extended）
      HUGO_VERSION: 0.164.0
    steps:
      # 关键1：直接安装 Hugo EXTENDED 版（deb 包，确保是 extended 以编译 Blowfish 的 SCSS）
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      # 关键2：拉取代码 + submodule（Blowfish 主题）+ 完整 git 历史（enableGitInfo 需要）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 读取 Pages 的 base_url（用户主页仓库下为 https://drink-less-milktea.github.io）
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # 主题若有 Node 依赖（PostCSS/autoprefixer 等）才安装；Blowfish 一般不需要
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Asia/Shanghai # 中文站点时区，影响文章日期
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
