# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://blowfish.page/docs/getting-started/

theme = "blowfish"
# baseURL 不写死：CI 用 --baseURL 覆盖（见 .github/workflows/hugo.yaml）；
# 本地预览时 Hugo 默认用 http://example.org/，不影响开发。
defaultContentLanguage = "zh-cn"
# 注：Hugo 0.158.0 起 languageCode 被废弃，改用每个语言块里的 locale
# （已在 languages.zh-cn.toml 中设置 locale = "zh-cn"）

# 中文站点：开启 CJK 语言支持，保证字数统计/摘要正确
hasCJKLanguage = true

# 让文章「最后修改时间」取真实 git 提交时间（CI 配合 fetch-depth: 0）
enableGitInfo = true

# pluralizeListTitles = "true" # hugo function useful for non-english languages, find out more in  https://gohugo.io/getting-started/configuration/#pluralizelisttitles

enableRobotsTXT = true
summaryLength = 0

buildDrafts = false
buildFuture = false

enableEmoji = true

# googleAnalytics = "G-XXXXXXXXX"

[pagination]
  pagerSize = 100

[imaging]
  anchor = 'Center'

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 0
  toLower = false

    [[related.indices]]
        name = "tags"
        weight = 100

    [[related.indices]]
        name = "categories"
        weight = 100

    [[related.indices]]
        name = "series"
        weight = 50

    [[related.indices]]
        name = "authors"
        weight = 20

    [[related.indices]]
        name = "date"
        weight = 10

    [[related.indices]]
      applyFilter = false
      name = 'fragmentrefs'
      type = 'fragments'
      weight = 10
